{% extends "portal/base.html" %}
{% block content %}
<div class="page-center">
  <div class="card">
    <h2>Logowanie</h2>
    <p class="muted">Użyj loginu (np. e-mail) i hasła. Admin tworzy konta użytkowników.</p>
    <form method="post" style="margin-top:16px">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Login</label>
        <input id="id_username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="id_password">Hasło</label>
        <input id="id_password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <div class="actions mt-2">
        <button class="btn" type="submit">Zaloguj</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
