{% extends "portal/base.html" %}
{% block content %}
<div style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:32px 20px">
  <div class="card" style="max-width:400px;width:100%;padding:36px 32px">
    <h1 style="font-size:1.2rem;font-weight:800;margin:0 0 8px">Nie pamiętam hasła</h1>
    <p class="muted small" style="margin-bottom:22px">
      Podaj swój adres e-mail — wyślemy link do ustawienia nowego hasła.
    </p>
    <form method="post">
      {% csrf_token %}
      <div class="field" style="margin-bottom:20px">
        <label for="id_email">E-mail</label>
        <input id="id_email" name="email" type="email" required
               placeholder="twoj@email.pl" autocomplete="email" autofocus>
      </div>
      <div class="actions">
        <button type="submit" class="btn" style="flex:1;justify-content:center">Wyślij link resetujący</button>
      </div>
    </form>
    <hr style="border:none;border-top:1px solid var(--border);margin:20px 0">
    <p class="muted small" style="text-align:center;margin:0">
      <a href="{% url 'login' %}" style="color:var(--accent-h)">Powrót do logowania</a>
    </p>
  </div>
</div>
{% endblock %}
