{% extends "portal/base.html" %}
{% block content %}
<div style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:32px 20px">
  <div class="card" style="max-width:440px;width:100%;text-align:center;padding:40px 32px">
    <p style="font-size:3rem;margin:0 0 16px">📬</p>
    <h1 style="font-size:1.2rem;font-weight:800;margin:0 0 14px">Sprawdź skrzynkę e-mail</h1>
    <p style="color:var(--text-2);line-height:1.75;margin:0 0 20px">
      Jeśli konto z tym adresem e-mail istnieje, wysłaliśmy link do resetowania hasła.<br>
      Link jest ważny <strong>24 godziny</strong>.
    </p>
    <p class="muted small" style="margin:0 0 24px">
      Nie dostałeś/aś wiadomości? Sprawdź folder spam.
    </p>
    <a href="{% url 'login' %}" class="btn secondary sm">Powrót do logowania</a>
  </div>
</div>
{% endblock %}
