{% extends "portal/base.html" %}
{% block content %}
<div style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:32px 20px">
  <div class="card" style="max-width:460px;width:100%;text-align:center;padding:40px 32px">
    <p style="font-size:3rem;margin:0 0 16px">⏰</p>
    <h1 style="font-size:1.3rem;font-weight:800;margin:0 0 14px;color:var(--red)">Link wygasł lub jest nieprawidłowy</h1>
    <p style="color:var(--text-2);line-height:1.75;margin:0 0 24px">
      Link aktywacyjny mógł wygasnąć (ważny 24 godziny) lub został już użyty.
      Możesz poprosić o wysłanie nowego linku.
    </p>
    <a href="{% url 'resend_verification' %}" class="btn" style="display:inline-block;margin-bottom:16px">
      Wyślij nowy link aktywacyjny
    </a>
    <br>
    <a href="{% url 'login' %}" class="btn secondary sm" style="display:inline-block">Powrót do logowania</a>
  </div>
</div>
{% endblock %}
